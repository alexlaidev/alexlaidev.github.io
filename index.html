<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Chat Room</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #e5ddd5; margin: 0; padding: 20px; }
        #chat-card { width: 100%; max-width: 400px; background: white; border-radius: 15px; shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; border: 1px solid #ccc; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #name-area { padding: 10px; background: #eee; border-bottom: 1px solid #ddd; }
        #name-input { width: 90%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        #display-area { flex-grow: 1; padding: 15px; overflow-y: auto; background: #efe7dd; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 8px 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); width: fit-content; max-width: 80%; }
        .msg b { color: #128c7e; font-size: 0.8em; display: block; }
        #input-area { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        #msg-input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

    <div id="chat-card">
        <div id="header">chat room</div>
        
        <div id="name-area">
            <input type="text" id="name-input" placeholder="Enter your Name..." maxlength="15">
        </div>

        <div id="display-area">
            </div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        // 1. Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 2. YOUR REAL CONFIG (Pasted from your message)
        const firebaseConfig = {
            apiKey: "AIzaSyBUpDv-dm_Lg9uAh_R2H-oiV1T5qdM8IM4",
            authDomain: "chat-room-590b3.firebaseapp.com",
            projectId: "chat-room-590b3",
            storageBucket: "chat-room-590b3.firebasestorage.app",
            messagingSenderId: "886950180428",
            appId: "1:886950180428:web:8c0497504f6e32a05526e9",
            measurementId: "G-T95D06TG42"
        };

        // 3. Initialize
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatDoc = doc(db, "chat", "latest");

        const displayArea = document.getElementById('display-area');
        const nameInput = document.getElementById('name-input');
        const msgInput = document.getElementById('msg-input');

        // Load History from LocalStorage
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

        function updateUI() {
            displayArea.innerHTML = '';
            // Show last 10 lines
            chatHistory.slice(-10).forEach(m => {
                displayArea.innerHTML += `<div class="msg"><b>${m.name}</b>${m.text}</div>`;
            });
            displayArea.scrollTop = displayArea.scrollHeight;
        }

        updateUI();

        // 4. LISTEN FOR REMOTE MESSAGES (THE ONLINE PART)
        onSnapshot(chatDoc, (snapshot) => {
            const data = snapshot.data();
            if (data) {
                const lastSaved = chatHistory[chatHistory.length - 1];
                // Only add if it's a new timestamp
                if (!lastSaved || lastSaved.timestamp !== data.timestamp) {
                    chatHistory.push(data);
                    localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
                    updateUI();
                }
            }
        });

        // 5. SEND MESSAGE FUNCTION
        window.sendMessage = async () => {
            const name = nameInput.value || "Anonymous";
            const text = msgInput.value;
            if (!text) return;

            // This overwrites the ONE document in Firebase to save your limit
            await setDoc(chatDoc, {
                name: name,
                text: text,
                timestamp: Date.now()
            });

            msgInput.value = '';
        };
    </script>
</body>
</html>
