<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat Room Game</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        #chat-container { width: 350px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px-10px rgba(0,0,0,0.1); margin-top: 20px; }
        #name-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #display-area { height: 250px; border: 1px solid #eee; margin-bottom: 10px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; font-size: 14px; }
        .msg b { color: #007bff; }
        #input-area { display: flex; gap: 5px; }
        #msg-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Chat Room</h2>
    <div id="chat-container">
        <input type="text" id="name-input" placeholder="Type your name here...">
        
        <div id="display-area">
            </div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

<script type="module">
  // Import Firebase (v10+)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // TODO: PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const chatDoc = doc(db, "chat", "latest");

  const displayArea = document.getElementById('display-area');
  const nameInput = document.getElementById('name-input');
  const msgInput = document.getElementById('msg-input');

  // 1. Load history from LocalStorage
  let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

  function updateUI() {
    displayArea.innerHTML = '';
    // Show only the last 10 messages
    const last10 = chatHistory.slice(-10);
    last10.forEach(m => {
      displayArea.innerHTML += `<div class="msg"><b>${m.name}:</b> ${m.text}</div>`;
    });
    displayArea.scrollTop = displayArea.scrollHeight;
  }

  updateUI();

  // 2. Listen to Firebase for the "Single" latest message
  onSnapshot(chatDoc, (snapshot) => {
    const data = snapshot.data();
    if (data) {
      // Only add to history if it's different from the last saved message
      const lastSaved = chatHistory[chatHistory.length - 1];
      if (!lastSaved || lastSaved.timestamp !== data.timestamp) {
        chatHistory.push(data);
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
        updateUI();
      }
    }
  });

  // 3. Send message (Overwrites the single Firebase doc)
  window.sendMessage = async () => {
    const name = nameInput.value || "Anonymous";
    const text = msgInput.value;
    if (!text) return;

    await setDoc(chatDoc, {
      name: name,
      text: text,
      timestamp: Date.now() // Unique ID to track changes
    });

    msgInput.value = '';
  };
</script>
</body>
</html>
